name: shedbooks_client
description: ShedBooks Flutter web client
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  auth0_flutter: ^1.4.0
  go_router: ^14.2.0
  http: ^1.2.0
  provider: ^6.1.0
  archive: ^3.6.1
  excel: ^4.0.6
  file_picker: ^8.1.7
  pdf: ^3.11.1
  printing: ^5.13.2
  flutter_typeahead: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
