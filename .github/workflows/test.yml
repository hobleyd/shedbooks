name: Test

on:
  push:
    branches: [main]

jobs:
  test:
    name: Analyse & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyse
        run: dart analyze --fatal-infos

      - name: Test
        run: dart test --reporter expanded
