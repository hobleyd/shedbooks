networks:
  shedbooks-data:
    internal: true
  shedbooks-web: {}

services:
  db:
    build:
      context: ./db
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/var/lib/postgresql/ssl/server.crt
      - -c
      - ssl_key_file=/var/lib/postgresql/ssl/server.key
    environment:
      POSTGRES_DB: shedbooks
      POSTGRES_USER: shedbooks
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./certs/postgres:/ssl-certs:ro
      - ./server/lib/infrastructure/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shedbooks -d shedbooks"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shedbooks-data
    restart: unless-stopped

  server:
    build:
      context: ./server
    environment:
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shedbooks
      DB_USER: shedbooks
      DB_PASSWORD: ${DB_PASSWORD}
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shedbooks-data
      - shedbooks-web
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        AUTH0_DOMAIN: ${AUTH0_DOMAIN}
        AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
        AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
        API_URL: ${API_URL:-/api}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - server
    networks:
      - shedbooks-web
    restart: unless-stopped

volumes:
  postgres_data:
