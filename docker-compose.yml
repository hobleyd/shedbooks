services:
  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    environment:
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shedbooks
      DB_USER: shedbooks
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shedbooks
      POSTGRES_USER: shedbooks
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/lib/infrastructure/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shedbooks -d shedbooks"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

volumes:
  postgres_data:
